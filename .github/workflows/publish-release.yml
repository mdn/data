name: publish-release

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      force-npm-publish:
        description: "Force npm publish"
        type: boolean

permissions:
  contents: write
  id-token: write # OIDC for npm Trusted Publishing
  pull-requests: write

jobs:
  publish-release:
    if: github.repository == 'mdn/data'
    runs-on: ubuntu-latest

    steps:
      - name: Release
        uses: GoogleCloudPlatform/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release

      - name: Checkout
        if: ${{ github.event.inputs.force-npm-publish || steps.release.outputs.release_created }}
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup Node
        if: ${{ github.event.inputs.force-npm-publish || steps.release.outputs.release_created }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          registry-url: "https://registry.npmjs.org/"
          node-version-file: ".nvmrc"
          package-manager-cache: false

      - name: Install
        if: ${{ github.event.inputs.force-npm-publish || steps.release.outputs.release_created }}
        run: npm ci

      - name: Publish
        if: ${{ github.event.inputs.force-npm-publish || steps.release.outputs.release_created }}
        run: npm publish --access public --provenance
