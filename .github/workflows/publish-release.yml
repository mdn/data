name: publish-release

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      force-npm-publish:
        description: "Force npm publish"
        type: boolean

permissions:
  contents: write
  id-token: write # OIDC for npm Trusted Publishing
  pull-requests: write

jobs:
  publish-release:
    if: github.repository == 'mdn/data'
    runs-on: ubuntu-latest

    steps:
      - name: Release
        uses: GoogleCloudPlatform/release-please-action@5c625bfb5d1ff62eadeeb3772007f7f66fdcf071 # v4.4.1
        id: release

      - name: Checkout
        if: ${{ github.event.inputs.force-npm-publish || steps.release.outputs.release_created }}
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Setup Node
        if: ${{ github.event.inputs.force-npm-publish || steps.release.outputs.release_created }}
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          registry-url: "https://registry.npmjs.org/"
          node-version-file: ".nvmrc"
          package-manager-cache: false

      - name: Install
        if: ${{ github.event.inputs.force-npm-publish || steps.release.outputs.release_created }}
        run: npm ci

      - name: Publish
        if: ${{ github.event.inputs.force-npm-publish || steps.release.outputs.release_created }}
        run: npm publish --access public --provenance
