name: publish-release

on:
  push:
    branches:
      - main

  workflow_dispatch:
    inputs:
      force-npm-publish:
        description: "Force npm publish"
        type: boolean

permissions:
  contents: write
  id-token: write # OIDC for npm Trusted Publishing
  pull-requests: write

jobs:
  publish-release:
    if: github.repository == 'mdn/data'
    runs-on: ubuntu-latest

    steps:
      - name: Release
        uses: GoogleCloudPlatform/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release

      - name: Checkout
        if: ${{ github.event.inputs.force-npm-publish || steps.release.outputs.release_created }}
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Setup Node
        if: ${{ github.event.inputs.force-npm-publish || steps.release.outputs.release_created }}
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          registry-url: "https://registry.npmjs.org/"
          node-version-file: ".nvmrc"
          package-manager-cache: false

      - name: Install
        if: ${{ github.event.inputs.force-npm-publish || steps.release.outputs.release_created }}
        run: npm ci

      - name: Publish
        if: ${{ github.event.inputs.force-npm-publish || steps.release.outputs.release_created }}
        run: npm publish --access public --provenance
